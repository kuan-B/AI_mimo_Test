name: Update Movie Data

on:
  schedule:
    # 每天 UTC 02:00 (北京时间 10:00) 运行
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      year:
        description: '指定年份（留空则更新所有年份）'
        required: false
        default: ''
      update_posters:
        description: '是否更新海报'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run scraper
        run: |
          cd scraper
          ARGS=""
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="--year ${{ github.event.inputs.year }}"
          fi
          if [ "${{ github.event.inputs.update_posters }}" = "true" ]; then
            ARGS="$ARGS --update-posters"
          fi
          python scrape.py $ARGS
      
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: update movie data [automated]"
          git push
